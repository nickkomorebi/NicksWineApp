# Cloudflare Tunnel config for wine.nickpegan.com
#
# One-time setup (run once on your Mac, not in Docker):
#   cloudflared tunnel login
#   cloudflared tunnel create nicks-wine-app
#   cloudflared tunnel route dns nicks-wine-app wine.nickpegan.com
#
# Then `docker compose up -d` — no other changes needed.
tunnel: nicks-wine-app

ingress:
  - hostname: wine.nickpegan.com
    service: http://app:3000
  - service: http_status:404
